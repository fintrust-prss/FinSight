# ==============================================================
# MSME Financial Health Card — Scoring Weights Configuration
# ==============================================================
#
# This file is the single source of truth for all scoring thresholds
# and weights. Never hardcode thresholds in Python code.
#
# Per the spec (Section 2 note): IDBI/SBI/PSU banks weight EPFO +
# utility + GST heavily (manufacturing portfolios); HDFC/Axis/private
# banks weight UPI + POS + bureau more; NBFCs lean hardest on
# UPI/telecom/digital footprint.
#
# bank_profile: select the active profile at runtime via env var
# DEFAULT_BANK_PROFILE=idbi (or hdfc, axis, nbfc_generic)
# ==============================================================

# Version this config alongside model versions
config_version: "1.0.0"

# ==============================================================
# Bank Weight Profiles (must sum to 1.0 per profile)
# Keys match the 7 scoring dimension names.
# ==============================================================
bank_profiles:

  # IDBI / PSU Bank — manufacturing-heavy MSME portfolio
  idbi:
    revenue_cashflow:        0.25  # GST turnover + bank statement
    compliance_formalization: 0.20  # GST filing + Udyam + EPFO
    workforce_stability:     0.15  # EPFO headcount + wage bill
    operational_footprint:   0.15  # DISCOM electricity consumption
    digital_adoption:        0.10  # UPI/ONDC/e-commerce
    credit_behavior:         0.10  # Bureau + AA repayment proxy
    resilience_volatility:   0.05  # CoV, raw-material sensitivity

  # HDFC / Axis / Private Bank — urban trade/services focus
  hdfc:
    revenue_cashflow:        0.20
    compliance_formalization: 0.15
    workforce_stability:     0.10
    operational_footprint:   0.10
    digital_adoption:        0.20  # Higher weight on digital signals
    credit_behavior:         0.20  # Higher weight on bureau/repayment
    resilience_volatility:   0.05

  # NBFC Generic — thin-file / new-to-credit focus
  nbfc_generic:
    revenue_cashflow:        0.20
    compliance_formalization: 0.10
    workforce_stability:     0.10
    operational_footprint:   0.10
    digital_adoption:        0.25  # Heaviest on UPI/telecom/digital
    credit_behavior:         0.15
    resilience_volatility:   0.10


# ==============================================================
# Dimension 1: Revenue & Cash Flow Health (0–100)
# ==============================================================
revenue_cashflow:

  # GST Turnover trend (last 12 months MoM growth)
  gst_turnover:
    weight: 0.35
    thresholds:
      excellent:   { min_growth_pct: 5.0,   score: 90 }   # ≥5% MoM growth
      good:        { min_growth_pct: 0.0,   score: 70 }   # Flat but positive
      fair:        { min_growth_pct: -5.0,  score: 50 }   # Slight decline
      poor:        { min_growth_pct: -15.0, score: 25 }   # Steep decline
      critical:    { below: -15.0,           score: 10 }   # >15% decline

  # UPI/POS inflow stability (coefficient of variation, lower = more stable)
  upi_inflow_cov:
    weight: 0.25
    thresholds:
      excellent: { max_cov: 0.15, score: 90 }  # Very stable
      good:      { max_cov: 0.30, score: 70 }
      fair:      { max_cov: 0.50, score: 50 }
      poor:      { max_cov: 0.75, score: 25 }
      critical:  { above: 0.75,   score: 10 }

  # AA Bank Statement: average monthly balance (INR)
  avg_balance:
    weight: 0.20
    thresholds:
      excellent: { min_inr: 500_000,  score: 90 }  # ≥5L
      good:      { min_inr: 200_000,  score: 70 }  # ≥2L
      fair:      { min_inr: 50_000,   score: 50 }  # ≥50K
      poor:      { min_inr: 10_000,   score: 25 }  # ≥10K
      critical:  { below: 10_000,     score: 10 }  # <10K

  # AA Bank Statement: bounce rate (bounced transactions / total)
  bounce_rate:
    weight: 0.20
    thresholds:
      excellent: { max_rate: 0.01, score: 90 }  # <1% bounces
      good:      { max_rate: 0.03, score: 70 }  # <3%
      fair:      { max_rate: 0.06, score: 50 }  # <6%
      poor:      { max_rate: 0.10, score: 25 }  # <10%
      critical:  { above: 0.10,   score: 5  }  # ≥10%


# ==============================================================
# Dimension 2: Compliance & Formalization (0–100)
# ==============================================================
compliance_formalization:

  # GST filing timeliness (% of months filed on time, last 18m)
  gst_filing_rate:
    weight: 0.40
    thresholds:
      excellent: { min_rate: 1.00, score: 100 }  # 100% on time
      good:      { min_rate: 0.90, score: 80  }  # ≥90%
      fair:      { min_rate: 0.75, score: 55  }  # ≥75%
      poor:      { min_rate: 0.50, score: 30  }  # ≥50%
      critical:  { below: 0.50,   score: 10  }   # <50%

  # Udyam registration status
  udyam_registered:
    weight: 0.20
    scores:
      registered:   85
      not_registered: 20

  # EPFO filing regularity (% of months with on-time contribution, last 18m)
  epfo_filing_rate:
    weight: 0.25
    thresholds:
      excellent: { min_rate: 1.00, score: 100 }
      good:      { min_rate: 0.90, score: 75  }
      fair:      { min_rate: 0.75, score: 50  }
      poor:      { min_rate: 0.50, score: 20  }
      critical:  { below: 0.50,   score: 5   }

  # License validity (active = full points; expired/missing = penalized)
  license_valid:
    weight: 0.15
    scores:
      valid:   100
      expired: 20
      missing: 0


# ==============================================================
# Dimension 3: Workforce Stability (0–100)
# ==============================================================
workforce_stability:

  # EPFO headcount trend (% change last 12 months)
  headcount_growth:
    weight: 0.40
    thresholds:
      excellent: { min_growth_pct: 10.0, score: 90 }
      good:      { min_growth_pct: 0.0,  score: 70 }
      fair:      { min_growth_pct: -5.0, score: 50 }
      poor:      { min_growth_pct: -15.0, score: 25 }
      critical:  { below: -15.0,          score: 10 }

  # Wage bill growth (MoM avg)
  wage_bill_growth:
    weight: 0.35
    thresholds:
      excellent: { min_growth_pct: 5.0,  score: 90 }
      good:      { min_growth_pct: 0.0,  score: 70 }
      fair:      { min_growth_pct: -5.0, score: 50 }
      poor:      { below: -5.0,           score: 20 }

  # Contribution consistency (% of months with zero contribution gaps)
  contribution_consistency:
    weight: 0.25
    thresholds:
      excellent: { min_rate: 1.00, score: 100 }
      good:      { min_rate: 0.90, score: 75  }
      fair:      { min_rate: 0.75, score: 45  }
      poor:      { below: 0.75,   score: 15  }


# ==============================================================
# Dimension 4: Operational Footprint (0–100)
# ==============================================================
operational_footprint:

  # Electricity utilization: consumed / sanctioned load (optimal range 60–90%)
  electricity_utilization:
    weight: 0.50
    thresholds:
      excellent: { min_util: 0.60, max_util: 0.90, score: 90 }  # 60–90%: ideal range
      good:      { min_util: 0.40, max_util: 1.00, score: 65 }  # 40–100%: acceptable
      fair:      { min_util: 0.20, max_util: 1.10, score: 45 }  # Under/over-utilized
      poor:      { below: 0.20,                     score: 20 }  # Near-idle

  # Payment regularity for utility bills (% months paid on time)
  utility_payment_rate:
    weight: 0.30
    thresholds:
      excellent: { min_rate: 1.00, score: 100 }
      good:      { min_rate: 0.90, score: 75  }
      fair:      { min_rate: 0.75, score: 50  }
      poor:      { below: 0.75,   score: 15  }
      disconnection_penalty: -40  # Applied when a disconnection event is detected

  # Seasonality alignment (correlation between electricity and GST patterns)
  seasonality_alignment:
    weight: 0.20
    thresholds:
      excellent: { min_corr: 0.70, score: 90 }  # Strong correlation = genuine operations
      good:      { min_corr: 0.40, score: 65 }
      fair:      { min_corr: 0.10, score: 40 }
      poor:      { below: 0.10,   score: 20 }   # Uncorrelated — potential mismatch signal


# ==============================================================
# Dimension 5: Digital Adoption & Market Reach (0–100)
# ==============================================================
digital_adoption:

  # UPI transaction diversity — Herfindahl-Hirschman Index (lower = more diverse)
  # HHI = sum of (counterparty_share^2); HHI < 0.15 = diverse, > 0.50 = concentrated
  upi_hhi:
    weight: 0.35
    thresholds:
      excellent: { max_hhi: 0.15, score: 90 }  # Well-diversified
      good:      { max_hhi: 0.25, score: 70 }
      fair:      { max_hhi: 0.40, score: 50 }
      poor:      { max_hhi: 0.60, score: 25 }
      critical:  { above: 0.60,  score: 10 }   # Highly concentrated

  # P2M ratio (business transactions vs peer-to-peer)
  upi_p2m_ratio:
    weight: 0.25
    thresholds:
      excellent: { min_ratio: 0.70, score: 90 }  # ≥70% business transactions
      good:      { min_ratio: 0.50, score: 70 }
      fair:      { min_ratio: 0.30, score: 50 }
      poor:      { below: 0.30,    score: 20 }

  # Digital platform presence (ONDC + e-commerce orders per month avg)
  digital_orders_per_month:
    weight: 0.25
    thresholds:
      excellent: { min_orders: 100, score: 90 }
      good:      { min_orders: 30,  score: 70 }
      fair:      { min_orders: 5,   score: 50 }
      poor:      { below: 5,        score: 25 }
      none:      { value: 0,        score: 10 }

  # Online presence (Google Business Profile rating)
  gmb_rating:
    weight: 0.15
    thresholds:
      excellent: { min_rating: 4.3, score: 90 }
      good:      { min_rating: 3.8, score: 70 }
      fair:      { min_rating: 3.0, score: 50 }
      poor:      { below: 3.0,     score: 20 }
      none:      { value: 0,       score: 25 }  # No profile — neutral (not penalized)


# ==============================================================
# Dimension 6: Credit Behavior (0–100)
# ==============================================================
credit_behavior:

  # Bureau score (if file exists)
  bureau_score:
    weight: 0.50
    thresholds:
      excellent: { min_score: 750, score: 95 }
      good:      { min_score: 700, score: 80 }
      fair:      { min_score: 650, score: 60 }
      poor:      { min_score: 600, score: 35 }
      critical:  { below: 600,    score: 15 }
      no_file:   { score: 40 }  # Thin file — neutral starting point, then adjusted by proxy

  # Bureau enquiry frequency (high enquiries = financial stress signal)
  bureau_enquiries_6m:
    weight: 0.20
    thresholds:
      excellent: { max_enquiries: 1, score: 95 }
      good:      { max_enquiries: 3, score: 75 }
      fair:      { max_enquiries: 5, score: 55 }
      poor:      { above: 5,         score: 25 }

  # AA-based repayment proxy (% of loan-like outflows that are regular vs erratic)
  aa_repayment_proxy:
    weight: 0.30
    thresholds:
      excellent: { min_regularity: 0.95, score: 90 }
      good:      { min_regularity: 0.85, score: 70 }
      fair:      { min_regularity: 0.70, score: 50 }
      poor:      { below: 0.70,          score: 20 }


# ==============================================================
# Dimension 7: Resilience & Volatility (0–100)
# ==============================================================
resilience_volatility:

  # Coefficient of variation of monthly cashflow (lower = more stable)
  cashflow_cov:
    weight: 0.40
    thresholds:
      excellent: { max_cov: 0.20, score: 90 }
      good:      { max_cov: 0.35, score: 70 }
      fair:      { max_cov: 0.55, score: 50 }
      poor:      { above: 0.55,  score: 20 }

  # Raw material price sensitivity
  # Calculated as correlation between commodity price index and MSME margin proxy
  commodity_price_sensitivity:
    weight: 0.35
    thresholds:
      low:    { max_corr: 0.30, score: 85 }  # Low sensitivity = resilient
      medium: { max_corr: 0.55, score: 60 }
      high:   { above: 0.55,   score: 30 }   # High sensitivity = margin at risk

  # Sector seasonality adjustment
  # Applied multiplicatively based on MSME's sector NIC code
  seasonality_adjustment:
    weight: 0.25
    sector_adjustments:
      food_manufacturing:  0.90  # Inherently seasonal — slight discount
      textiles:            0.92
      electronics:         0.97
      services:            1.00  # No adjustment
      trade:               0.95
      default:             0.95


# ==============================================================
# Decision Tier Thresholds (Section 6.3)
# ==============================================================
decision_tiers:
  disciplined:            { min_score: 75, label: "Disciplined",          action: "Yes-Go" }
  moderately_disciplined: { min_score: 55, label: "Moderately Disciplined", action: "Go with Conditions" }
  non_disciplined:        { min_score: 35, label: "Non-Disciplined",      action: "Review" }
  no_go:                  { min_score: 0,  label: "No-Go",                action: "Decline" }


# ==============================================================
# Anomaly Detection (Isolation Forest) — Phase 4
# ==============================================================
anomaly_detection:
  contamination: 0.05      # Expected fraction of anomalous MSMEs
  random_state: 42
  # Features fed to Isolation Forest (subset of all engineered features)
  feature_columns:
    - gst_turnover_growth_pct
    - upi_inflow_cov
    - avg_balance
    - epfo_filing_rate
    - electricity_utilization
    - upi_hhi
    - cashflow_cov
